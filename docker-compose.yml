# ─────────────────────────────────────────────────────
# NoMask — Docker Compose
# Backend FastAPI + Ollama sur la même machine
# ─────────────────────────────────────────────────────
#
# Usage :
#   docker compose up -d            # démarrer tout
#   docker compose logs -f backend  # voir les logs
#   docker compose down             # arrêter
#
# Le frontend Next.js tourne SÉPARÉMENT (npm run dev ou Vercel/VPS).
# ─────────────────────────────────────────────────────

services:
  # ── Backend FastAPI ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nomask-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Ollama tourne sur le HOST (pas dans Docker) → host.docker.internal
      OLLAMA_URL: http://host.docker.internal:11434
    # Accès au réseau hôte pour joindre Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"        # 2 cœurs max pour le scraping/rewriting
          memory: 1G         # Le backend Python est léger (~200 MB réel)
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
